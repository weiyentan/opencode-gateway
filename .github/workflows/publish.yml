# ── Publish Gateway and Aurora Glass ──────────────────────────────────────────
# Builds and publishes separate container images for the two modules that
# together form the OpenCode Gateway observability platform:
#
#   Gateway      (root Dockerfile)           — Python/FastAPI REST API
#   Aurora Glass (frontend/Dockerfile)       — browser-based telemetry dashboard
#
# Both images are built from the same repository revision and receive
# identical version tags (semver, SHA) so they are always deployed together.
# On pull_request events the images are built but not pushed.
#
# Architecture: Gateway serves the observability API; Aurora Glass is a
# separate frontend that consumes the Gateway API — see CONTEXT.md.
# ──────────────────────────────────────────────────────────────────────────────

name: Publish Gateway and Aurora Glass

on:
  push:
    branches: [ "master", "weiyentan-patch-1" ]
    tags: ["v*"]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: docker.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: gateway
            context: .
            dockerfile: Dockerfile
          - name: aurora-glass
            context: .
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
