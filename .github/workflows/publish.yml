# ── Publish Container Images ─────────────────────────────────────────────
# Single CI workflow that builds and publishes both Gateway and Aurora Glass
# container images. Both artifacts share the same version tags for a given
# repository revision, reflecting the split architecture: the Gateway serves
# the API and Aurora Glass serves the frontend dashboard.
#
# Image naming (configurable via DOCKER_IMAGE_NAME secret):
#   docker.io/<image-name>-gateway        — API service
#   docker.io/<image-name>-aurora-glass   — Frontend dashboard
#
# On pull_request events the images are built but not pushed (no login).
# On push/tag events they are built, tagged, and pushed to DockerHub.

name: Publish Container Images

on:
  push:
    branches: ["master", "weiyentan-patch-1"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

env:
  REGISTRY: docker.io

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: gateway
            context: .
            dockerfile: Dockerfile
          - name: aurora-glass
            context: ./frontend
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
