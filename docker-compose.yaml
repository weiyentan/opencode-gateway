# ═══════════════════════════════════════════════════════════════════════════
# Same-origin local development stack for Aurora Glass and Gateway
#
# Architecture:
#   Browser (single origin) ──→ frontend (nginx, port 8080)
#     ├── /api/*, /health, /admin/*, /docs  ──→ gateway (port 8000, internal)
#     └── /*  (static files)                  ──→ served by nginx directly
#
# The gateway is NOT exposed to the host — all traffic flows through the
# frontend nginx proxy. This provides a same-origin experience (no CORS)
# with Aurora Glass and the Gateway as separate containers.
# ═══════════════════════════════════════════════════════════════════════════

services:
  gateway:
    build: .
    container_name: opencode-gateway
    # No host ports: gateway is only reachable internally via Docker DNS
    # at http://gateway:8000. The frontend nginx proxies API calls here.
    expose:
      - "8000"
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8000"
      GATEWAY_DATABASE_HOST: postgres
      GATEWAY_DATABASE_PORT: "5432"
      GATEWAY_DATABASE_NAME: ${POSTGRES_DB:-opencode_gateway}
      GATEWAY_DATABASE_USER: ${POSTGRES_USER:-opencode}
      GATEWAY_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-opencode}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gateway-net
    restart: unless-stopped

  # ── Aurora Glass + Reverse Proxy ─────────────────────────────────────
  # Serves the Aurora Glass dashboard static files AND proxies API
  # requests to the internal gateway service. This is the sole browser
  # entrypoint — the single origin for same-origin local development.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: opencode-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      GATEWAY_UPSTREAM: http://gateway:8000
    depends_on:
      - gateway
    networks:
      - gateway-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: opencode-gateway-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencode_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-opencode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencode}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gateway-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-opencode} -d ${POSTGRES_DB:-opencode_gateway}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  gateway-net:
    driver: bridge
