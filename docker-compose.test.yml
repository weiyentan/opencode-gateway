# docker-compose.test.yml
# Starts a standalone Postgres container for integration tests.
# Uses port 5433 to avoid conflicting with the production Postgres on 5432.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest tests/integration/ -v -m integration
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: opencode-gateway-test-db
    environment:
      POSTGRES_DB: opencode_gateway_test
      POSTGRES_USER: opencode_test
      POSTGRES_PASSWORD: opencode_test
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U opencode_test -d opencode_gateway_test",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: "no"
