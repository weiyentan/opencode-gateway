decision: refine
confidence: 70
clarified_problem: >
  OpenCode Gateway addresses a genuine orchestration gap: managing the full lifecycle of headless OpenCode coding sessions — runner selection, workspace creation, port allocation, OpenCode session management, diff retrieval, cleanup, and pre-flight health checks — in a way that AWX alone cannot provide. AWX handles playbook execution but lacks the domain-specific state machine, policy engine, and observation pipeline that coding workloads require. However, the project is overbuilt: 54% of its interface methods (7 of 13 across the ExecutorPlugin and OpenCodeClientProtocol) are pure YAGNI "future surface" that inflate the codebase, test suite, and delivery cost without delivering proportional value. The synchronous POST /jobs handler (1127 lines) defeats the async-orchestration premise. Paperclip integration — the primary consumer — remains incomplete, invalidating the "95% complete" claim. The core architecture (four-layer separation, executor plugin pattern, security boundaries per ADR 0004) is sound, but the project needs significant targeted refinement before it is production-ready.
main_assumptions:
  - "OpenCode Serve is a stable, long-running HTTP API that can be managed as systemd"
  - "Runner VMs are persistent (not ephemeral) for the foreseeable future"
  - "AWX remains the correct production executor (premise unvalidated — AWX triple-launch overhead has never been measured)"
  - "Postgres is the right state store for concurrent multi-caller orchestration (validated by council)"
  - "The four-layer architecture (API -> Core -> Executor -> OpenCode Client) is the correct separation of concerns (validated by council)"
  - "Paperclip is the primary consumer of the Gateway API (unvalidated — Paperclip integration #13 is incomplete)"
  - "The 1000-port range (10000-10999) is sufficient (unvalidated — no concurrency/capacity numbers exist)"
missing_information:
  - "Expected job volume per day and concurrent runner count — needed to validate port range, Postgres sizing, and polling-vs-webhooks decision"
  - "Expected observation volume (observations/day) — needed to validate observation table design and retention policy"
  - "AWX triple-launch overhead as percentage of total job time — needed to validate executor architecture cost"
  - "Paperclip-Gateway API contract — the primary consumer has never validated the API surface"
  - "Observation authentication mechanism — how Runner VMs authenticate to POST /observations is undefined"
  - "Target success metrics (job completion rate, P95 latency, max concurrent jobs, cost overrun prevention)"
  - "Postgres hosting cost estimate for production deployment"
risks:
  - "Synchronous POST /jobs blocks for up to 5+ minutes — the 1127-line God function is the single largest architectural defect and a production blocker (unanimous council agreement)"
  - "54% of interface methods (7 of 13) are unused 'future surface' — every new executor implementor must provide stubs for methods the Gateway never calls, inflating delivery cost and testing burden"
  - "Paperclip integration (#13) is incomplete — the Gateway's primary consumer has never validated the API, meaning the entire surface area is speculative"
  - "Observation authentication is undefined — POST /observations has no documented auth, creating a poison vector for the policy engine"
  - "AWX triple-launch per job dominates operational cost at scale — 3 AWX job launches per coding job for operations that amount to mkdir and systemctl start"
  - "No session cost guardrails — the Gateway can launch unbounded-cost OpenCode sessions ($500+ in LM calls) with no mechanism to limit them"
  - "No end-to-end vertical-slice integration test exists across the full Gateway->AWX->Runner VM->OpenCode chain"
non_goals:
  - "Full multi-tenant SaaS support with org-level isolation (correctly out of scope)"
  - "Complex Kubernetes runner pod orchestration (correctly out of scope for MVP)"
  - "Replacing Paperclip or becoming a general agent orchestration platform (correctly out of scope)"
  - "Full autonomous approval framework that self-approves based on policies (correctly out of scope)"
  - "Webhook callback replacement for AWX polling in MVP (deliberately deferred by consensus)"
architecture_concerns:
  - "Synchronous POST /jobs God function (1127 lines) violates async-orchestration premise — must be converted to 202 Accepted with background processing"
  - "Dual database access pattern (raw asyncpg in policy layer vs SQLAlchemy ORM everywhere else) creates silent maintenance trap during schema migrations"
  - "Observation data has no lifecycle management — three time-series tables with no partitioning, retention policy, or downsampling"
  - "AWX executor polling blocks Gateway concurrency slots — each in-flight AWX operation consumes a worker thread for up to 300s"
  - "Template ID coupling with no startup validation — misconfigured template IDs produce runtime errors instead of startup failures"
  - "Port allocation has no reservation timeout — orphaned ports from failed workspace creation are never automatically reclaimed"
  - "No DB-level state machine enforcement (CHECK constraints) on gateway_jobs.status transitions — application-only validation is fragile"
  - "Observation data in relational tables is the wrong storage model for time-series telemetry — single generic table with metric discriminator recommended"
  - "No graceful degradation mode when Postgres is down — GET endpoints cannot serve cached state during database outage"
delivery_concerns:
  - "Every original issue exceeded the 15-30 minute target (smallest: 60 min; largest: 300 min with Low confidence)"
  - "Risk ordering was inverted — the highest-risk item (AWX executor, #10) was deferred to the critical path instead of tackled as an early spike"
  - "No end-to-end validation milestones existed — the project was built in horizontal layers rather than vertical slices"
  - "The '95% complete' metric was misleading — it counted issues closed, not integrations validated"
  - "Future-surface tax inflated delivery cost — ~20% overhead per executor-related issue for implementing and testing unused methods"
cost_concerns:
  - "AWX triple-launch per job dominates infrastructure cost at scale — 3 AWX job launches per coding job, each running a full Ansible playbook for trivial operations (mkdir, systemctl start)"
  - "650-test suite is disproportionately expensive for ~4,000 lines of orchestration glue — CI time, maintenance burden, and cognitive overhead (though all roles agree simplifying the code will shrink tests naturally)"
  - "No session cost guardrails — the Gateway can launch OpenCode sessions with unbounded LM token spend ($500+ indistinguishable from $5)"
  - "Observation ingestion pipeline (push-agents, three Postgres tables, authless endpoint) duplicates existing monitoring tooling — policy evaluation is value, ingestion is overhead"
  - "Observation ingestion deferral from MVP would eliminate Postgres cost for telemetry storage, push-agent maintenance, and auth design"
must_answer_before_prd:
  - "What is the async contract for POST /jobs? (202 Accepted with Location header and polling, or webhook callback on completion?)"
  - "What is the Paperclip-Gateway API contract? (What does Paperclip actually need from the Gateway API?)"
  - "Should observation ingestion be deferred from MVP, with the policy engine consuming runner status from PATCH /runners set by existing monitoring tools?"
  - "Where do session cost guardrails (max_cost, max_duration_minutes) live — Gateway or OpenCode Serve? When must they be implemented relative to production deployment?"
  - "How do Runner VMs authenticate to POST /observations — or should this be deferred/deleted from MVP scope?"
  - "What are the target success metrics? (job completion rate, P95 latency, max concurrent jobs, observation staleness)"
recommended_prd_shape:
  - section: "Problem Statement"
    purpose: "Clarify that the Gateway fills a gap AWX cannot address — domain-specific state machine, coding workload policy engine, port allocation — without overstating the scope or understating the Paperclip dependency"
  - section: "Scope — What Changes"
    purpose: "Define the surgical refinement scope: strip 7 unused protocol methods, convert POST /jobs to async, consolidate dual DB access, add cost guardrails, defer observation ingestion, measure AWX overhead, validate with Paperclip"
  - section: "Implementation Gates (from Delivery Planner)"
    purpose: "Replace the original 14-issue breakdown with the 37-issue, 7-gate plan: Gate 0 scope pruning, Gate 1 async jobs, Gate 2 AWX vertical slice, Gate 3 Paperclip validation, Gate 4 production safety, Gate 5 test rationalization, Gate 6 documentation"
  - section: "Success Criteria"
    purpose: "Define measurable targets: job completion rate >=95%, P95 end-to-end latency <=10 min, max concurrent jobs per runner (configurable, default 5), session cost overrun prevention 100%, policy false-positive rate <1%"
  - section: "Cost Model"
    purpose: "Document expected job volume, concurrent runners, AWX triple-launch overhead measurement methodology, Postgres hosting cost estimate, and the threshold for SSH-direct executor investment (>30% AWX-to-coding time ratio)"
  - section: "Security & Authentication"
    purpose: "Define observation auth (or its deferral from MVP), runner authentication for telemetry ingestion, and the API key model for Gateway callers"
  - section: "Out of Scope (Refined)"
    purpose: "Restate the out-of-scope items from the original PRD, plus add: webhook callback replacement for AWX polling, observation ingestion pipeline (deferred to Phase 5), SSH-direct executor (add only if AWX overhead threshold is exceeded)"
suggested_issue_breakdown:
  - title: "Gate 0.1: Document expected load parameters"
    goal: "Establish capacity and concurrency assumptions before architecture decisions"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Published document covering: expected jobs/day, concurrent runners, observation volume per runner"
  - title: "Gate 0.2: Prune ExecutorPlugin ABC — remove restart_opencode and collect_state"
    goal: "Eliminate 2 of 7 unused methods from the required interface; move to optional subclass"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "ExecutorPlugin ABC no longer requires restart_opencode or collect_state"
      - "LocalExecutor and AWXExecutorPlugin compile without stubs for removed methods"
  - title: "Gate 0.3: Prune OpenCodeClientProtocol — keep only get_session_diff and abort_session"
    goal: "Eliminate 5 unused methods from the client protocol; drop from 7 to 2 required methods"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "OpenCodeClientProtocol has exactly 2 required methods"
      - "All tests for removed methods are deleted or migrated"
  - title: "Gate 0.4: Delete Pydantic models for removed protocol methods"
    goal: "Remove dead model code that was only used by removed methods"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "git diff --stat confirms model file reduction"
      - "No imports of removed models remain in the codebase"
  - title: "Gate 0.5: Prune tests for removed protocol methods"
    goal: "Eliminate ~180 tests that exercise dead code paths (30% of 650-test suite)"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Test count drops from ~650 to ~470"
      - "CI still passes with >90% coverage on remaining surface"
  - title: "Gate 1.1: Define async contract for POST /jobs"
    goal: "Specify the 202 Accepted workflow before implementing"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Published ADR or API spec: POST /jobs returns 202 with Location: /jobs/{id}"
      - "Caller polls GET /jobs/{id} for status and diff URL"
  - title: "Gate 1.2: Add DB-level CHECK constraints on job status transitions"
    goal: "Enforce state machine integrity at the storage level"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Alembic migration adds CHECK constraint on gateway_jobs.status"
      - "Direct SQL insert of invalid status fails at DB level"
  - title: "Gate 1.3: Extract validate_job_request from create_job God function"
    goal: "Decompose the 1127-line handler into testable units"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "validate_job_request is an independent, tested function"
      - "Unit test verifies input validation without mocking the full pipeline"
  - title: "Gate 1.4: Extract select_runner from create_job"
    goal: "Isolate runner selection logic into testable unit"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "select_runner returns a runner ID given policy, labels, and capacity"
      - "Unit test passes with mocked policy engine"
  - title: "Gate 1.5: Extract reserve_workspace from create_job"
    goal: "Isolate port allocation and workspace creation into testable unit"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "reserve_workspace allocates port atomically and returns workspace ID"
      - "Unit test verifies port contention handling"
  - title: "Gate 1.6: Build background worker for job lifecycle"
    goal: "Create async worker that polls pending jobs and transitions through states"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Background worker picks up pending jobs and transitions them through lifecycle"
      - "Job reaches completed state via background processing"
  - title: "Gate 1.7: Wire POST /jobs to return 202 immediately"
    goal: "Connect the decomposed units to return 202 in <50ms"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "POST /jobs returns HTTP 202 in under 50ms"
      - "Full lifecycle completes via background worker"
  - title: "Gate 1.8: Ensure GET /jobs/{id} returns status and diff URL"
    goal: "Complete the polling contract"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "GET /jobs/{id} returns current status and diff URL when complete"
      - "E2E test verifies polling flow end-to-end"
  - title: "Gate 2.1: Write AWX template contract specification"
    goal: "Document the expected extra_vars and outputs for all 3 AWX templates"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Published spec covering extra_vars keys, template names, and expected outputs"
  - title: "Gate 2.2: Add startup validation for AWX template IDs"
    goal: "Fail fast at startup if template IDs are invalid"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Gateway calls GET /api/v2/job_templates/{id}/ on boot"
      - "Startup fails with clear error message for invalid template IDs"
  - title: "Gate 2.3: Implement create_workspace in AWXExecutorPlugin"
    goal: "Add concrete AWX workspace creation via template launch + polling"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Create workspace launches AWX template and polls to completion"
      - "Manual test verifies workspace directory created on runner"
  - title: "Gate 2.4: Implement start_opencode in AWXExecutorPlugin"
    goal: "Add concrete AWX OpenCode start via lifecycle template"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Start opencode launches lifecycle template with action: start"
      - "Manual test verifies OpenCode process running on runner"
  - title: "Gate 2.5: Implement stop_opencode and cleanup_workspace"
    goal: "Complete the executor lifecycle for all 6 operations"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Stop and cleanup both launch correct AWX templates"
      - "Manual test verifies process stopped and workspace removed"
  - title: "Gate 2.6: Build end-to-end smoke test"
    goal: "Validate full Gateway->AWX->Runner VM->OpenCode chain"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "E2E test: submit job -> workspace created -> OpenCode started -> (mock session) -> stopped -> cleaned up -> diff returned"
  - title: "Gate 2.7: Measure AWX triple-launch overhead"
    goal: "Determine if AWX orchestration cost is acceptable"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Published ratio of AWX orchestration time to coding time for 3 sample runs"
      - "Decision rule: if >30%, allocate SSH-direct executor budget"
  - title: "Gate 3.1: Write Paperclip-Gateway contract"
    goal: "Define the API surface Paperclip expects before implementation"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Published ADR covering API surface, error semantics, polling contract, callbacks"
  - title: "Gate 3.2: Build mock Paperclip client"
    goal: "Create a test client that mimics Paperclip's Gateway consumption"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Client script submits job via POST /jobs, polls GET /jobs/{id}, retrieves diff"
  - title: "Gate 3.3: Run Paperclip client against real Gateway"
    goal: "Validate API surface against a simulated primary consumer"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "All failures and API mismatches documented in a published log"
  - title: "Gate 3.4: Fix API surface mismatches"
    goal: "Adjust the Gateway API based on Paperclip client findings"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Client succeeds on re-run against fixed Gateway API"
  - title: "Gate 4.1: Add session cost guardrails to job model"
    goal: "Prevent unbounded-cost OpenCode sessions (moved from Gate 4 to Gate 1 per Cost Reviewer recommendation)"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Job request model includes max_cost and max_duration_minutes fields"
      - "Fields are passed through to OpenCode Serve API"
      - "Sessions exceeding limits are aborted"
  - title: "Gate 4.2: Consolidate database access pattern"
    goal: "Eliminate dual asyncpg/SQLAlchemy maintenance trap"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Single database access pattern used throughout the codebase"
      - "Policy layer no longer uses raw asyncpg queries"
  - title: "Gate 4.3: Rename ObservationBasedPolicy.check()"
    goal: "Fix naming violation where check() has side effects"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Method renamed to reflect its behavior (e.g., check_and_set_runner_status)"
      - "Or: mutation extracted from check method"
  - title: "Gate 4.4: Add DB-level CHECK constraints on job status"
    goal: "Defense-in-depth — enforce state machine at storage level"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "CHECK constraint on gateway_jobs.status for all valid transitions"
      - "Direct SQL insert of invalid status fails at DB level"
  - title: "Gate 4.5: Add port reservation timeout"
    goal: "Prevent orphaned ports from failed workspace creation"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Ports auto-reclaim after 5-minute TTL if workspace not confirmed"
  - title: "Gate 4.6: Document observation auth decision"
    goal: "Resolve the runner authentication gap for observation ingestion"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Decision published: either (a) defer observation ingestion, or (b) implement shared-token auth"
  - title: "Gate 5.1: Delete tests for removed protocol methods"
    goal: "Clean up tests that exercise dead code paths"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Test count drops proportionally to removed methods (~30%)"
  - title: "Gate 5.2: Build vertical-slice integration test"
    goal: "Replace top-3 layer-mocked unit tests with a single integration test"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Integration test covers Gateway->AWX executor->OpenCode client->state machine"
      - "Test passes in CI"
  - title: "Gate 5.3: Consolidate test_jobs.py"
    goal: "Shrink the 3498-line test file"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "File reduced by >=30%"
      - "Shared fixtures extracted, duplicate coverage eliminated"
  - title: "Gate 5.4: Add coverage threshold"
    goal: "Ensure core state machine paths remain well-tested"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Coverage report shows >=90% on core paths"
      - "Pruned surface excluded from threshold"
  - title: "Gate 5.5: Set CI timeout for test suite"
    goal: "Prevent test suite from becoming a deployment bottleneck"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "CI timeout set to 5 minutes"
      - "Flag for further consolidation if exceeded"
  - title: "Gate 6.1: Switch delivery dashboard to integration surfaces"
    goal: "Replace misleading 17/18 issue-count metric with integration validation tracking"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Dashboard shows: Gateway<->AWX, Gateway<->RunnerVM, Gateway<->Paperclip, Gateway<->OpenCode validation status"
  - title: "Gate 6.2: Publish success metrics"
    goal: "Define measurable targets for production readiness"
    estimated_size: "15-30 minutes"
    acceptance_criteria:
      - "Published metrics: >=95% job completion rate, <=10 min P95 latency, max 5 concurrent jobs per runner (configurable), 100% session cost overrun prevention"
council_disagreements:
  - topic: "Observation pipeline — keep or defer from MVP?"
    positions:
      - member: "Product Owner"
        view: "Observation/policy pipeline is differentiated value and must stay"
        resolution: "Conceded ingestion can be simpler (one generic table, Prometheus-compatible) but policy evaluation must remain"
      - member: "Skeptic"
        view: "Observation ingestion pipeline should be deferred from MVP; policy engine can consume runner status from PATCH /runners set by existing monitoring"
        resolution: "Accepted by convergence — all roles agree observation ingestion is separable from policy evaluation"
      - member: "Cost Reviewer"
        view: "Observation ingestion (push-agents, three tables, authless endpoint) is a cost center with no consumer"
        resolution: "See Skeptic resolution — deferral is the consensus recommendation"
  - topic: "Postgres vs SQLite for state store"
    positions:
      - member: "Cost Reviewer"
        view: "SQLite would handle the data volume at zero operational cost; Postgres is overkill"
        resolution: "Conceded in R2 — Postgres is correct for concurrent multi-caller access; SQLite would cause write contention"
      - member: "Platform Architect"
        view: "Postgres is correct for concurrent writers, but observation data does not need Postgres"
        resolution: "Accepted — Postgres for state, simpler storage for telemetry"
  - topic: "Webhooks vs polling for AWX callbacks"
    positions:
      - member: "Platform Architect"
        view: "Polling must be replaced with webhooks before production"
        resolution: "Deferred — consensus is polling works for MVP; webhooks are Phase 5 production hardening"
      - member: "Delivery Planner"
        view: "Webhooks are a 2-3 week project with infrastructure dependencies; polling is fine for MVP"
        resolution: "See Platform Architect resolution — webhooks deferred"
  - topic: "Cost guardrails timing"
    positions:
      - member: "Cost Reviewer"
        view: "Session cost guardrails (max_cost, max_duration_minutes) must be in Gate 1, not Gate 4"
        resolution: "Open — Delivery Planner has them in Gate 4; Cost Reviewer argues they should be Gate 1. Recommendation: move to Gate 1 per Cost Reviewer's non-negotiable"
      - member: "Delivery Planner"
        view: "Cost guardrails belong in Gate 4 (Production Safety) with other operational controls"
        resolution: "See Cost Reviewer resolution — unresolved scheduling disagreement"
next_action: >
  The project should proceed with targeted refinement following the Delivery Planner's 37-issue, 7-gate plan. Start with Gate 0 (scope pruning) to eliminate the 54% unused surface, then Gate 1 (async job submission) to fix the synchronous blocker. The Cost Reviewer's recommendation to move session cost guardrails (Issue 4.1) to Gate 1 should be adopted before real AWX jobs run. After Gates 0-1, build the AWX vertical slice (Gate 2) to validate the executor abstraction, then validate with Paperclip (Gate 3) before declaring production readiness. Run /council-run again after completing Gates 0-3 for re-validation, then proceed to /to-prd for formal PRD creation.
requires_human_review: true
