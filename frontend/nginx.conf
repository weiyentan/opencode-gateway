# Aurora Glass — OpenCode Gateway Observability Frontend
#
# Serves the static dashboard files and proxies API requests to the
# Gateway backend container.
#
# The GATEWAY_UPSTREAM variable is substituted at container start by
# docker-entrypoint.sh using envsubst. Default: http://gateway:8000

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy ────────────────────────────────────────────────────────
    # Forward API, health, and admin requests to the Gateway service.
    # The upstream URL is set at runtime via GATEWAY_UPSTREAM env var.

    location /health {
        proxy_pass ${GATEWAY_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass ${GATEWAY_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass ${GATEWAY_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass ${GATEWAY_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass ${GATEWAY_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static Files ─────────────────────────────────────────────────────
    # Serve the Aurora Glass dashboard static files.

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ─────────────────────────────────────────────────

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}
