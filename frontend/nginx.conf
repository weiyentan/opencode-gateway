# Aurora Glass — OpenCode Gateway Observability Frontend
#
# Serves the static dashboard files and proxies API requests to the
# Gateway backend container.
#
# The Gateway API URL is configured at runtime via the GATEWAY_API_URL
# environment variable. The ${GATEWAY_API_URL} placeholder is substituted
# by the docker-entrypoint.sh script using envsubst before nginx starts.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API Proxy ────────────────────────────────────────────────────────
    # Forward API, health, and admin requests to the Gateway service.
    # The target URL is set at container runtime via GATEWAY_API_URL env var.
    # Default: http://gateway:8000 (docker-compose service name).

    location /health {
        proxy_pass ${GATEWAY_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass ${GATEWAY_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass ${GATEWAY_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass ${GATEWAY_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass ${GATEWAY_API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static Files ─────────────────────────────────────────────────────
    # Serve the Aurora Glass dashboard static files.

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ─────────────────────────────────────────────────

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}
